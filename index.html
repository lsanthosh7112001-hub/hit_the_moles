<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mole Hit - Reflex Game</title>
    <style>
        :root {
            --grass-color: #4ade80;
            --hole-color: #78350f;
            --mole-color: #a855f7;
            --bg-color: #f0fdf4;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* UI Styling */
        .stats-container {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #166534;
        }

        .btn-start {
            padding: 10px 30px;
            font-size: 1.2rem;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .btn-start:hover { transform: scale(1.05); }
        .btn-start:active { transform: scale(0.95); }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 20px;
            background: #15803d;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        @media (min-width: 600px) {
            .game-grid {
                grid-template-columns: repeat(3, 150px);
                grid-template-rows: repeat(3, 150px);
            }
        }

        .hole {
            background: var(--hole-color);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.5);
        }

        /* The Mole */
        .mole {
            width: 80%;
            height: 80%;
            background: var(--mole-color);
            border-radius: 50% 50% 10% 10%;
            position: absolute;
            left: 10%;
            top: 100%; /* Hidden by default */
            transition: top 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            cursor: pointer;
        }

        .mole.up { top: 15%; }

        /* Mole Face Details */
        .mole::before, .mole::after {
            content: '';
            position: absolute;
            background: #000;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            top: 30%;
        }
        .mole::before { left: 25%; }
        .mole::after { right: 25%; }

        /* Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="timer">30</span>s</div>
    </div>

    <button class="btn-start" onclick="startGame()">Start Game</button>

    <div class="game-grid">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>

    <div id="overlay">
        <h1>Game Over!</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button class="btn-start" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const moles = document.querySelectorAll('.mole');
        const scoreBoard = document.querySelector('#score');
        const timerBoard = document.querySelector('#timer');
        const overlay = document.querySelector('#overlay');
        const finalScoreBoard = document.querySelector('#final-score');

        let lastHole;
        let timeUp = false;
        let score = 0;
        let timeLeft = 30;
        let timerId;

        // Audio Effects (Sine wave beeps)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playHitSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 600;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(moles) {
            const idx = Math.floor(Math.random() * moles.length);
            const hole = moles[idx];
            if (hole === lastHole) return randomHole(moles);
            lastHole = hole;
            return hole;
        }

        function peep() {
            // Difficulty curve: Moles speed up as score increases
            const difficultyMod = Math.max(200, 1000 - (score * 20));
            const time = randomTime(difficultyMod, difficultyMod + 400);
            const mole = randomHole(moles);
            
            mole.classList.add('up');
            
            setTimeout(() => {
                mole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            // Reset
            overlay.style.display = 'none';
            score = 0;
            timeLeft = 30;
            scoreBoard.textContent = 0;
            timerBoard.textContent = timeLeft;
            timeUp = false;
            
            peep();
            
            // Timer logic
            clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                timerBoard.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timeUp = true;
                    showGameOver();
                }
            }, 1000);
        }

        function whack(e) {
            if(!e.isTrusted) return; // Prevent cheaters using scripts
            score++;
            this.classList.remove('up');
            scoreBoard.textContent = score;
            playHitSound();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function showGameOver() {
            finalScoreBoard.textContent = score;
            overlay.style.display = 'flex';
        }

        moles.forEach(mole => mole.addEventListener('click', whack));
        moles.forEach(mole => mole.addEventListener('touchstart', whack));

    </script>
</body>
</html>
